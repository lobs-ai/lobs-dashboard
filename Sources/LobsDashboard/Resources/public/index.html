<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lobs Dashboard (Skeleton)</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 24px; max-width: 900px; }
    .row { display: flex; gap: 16px; }
    .col { flex: 1; }
    h1 { margin-top: 0; }
    .task { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .meta { color: #555; font-size: 12px; }
    .buttons { margin-top: 8px; display: flex; gap: 8px; }
    button { padding: 8px 10px; border-radius: 8px; border: 1px solid #999; background: #fff; cursor: pointer; }
    button:hover { background: #f5f5f5; }
    pre { background: #111; color: #eee; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #ddd; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Lobs Dashboard (Working Skeleton)</h1>
  <div class="meta">This is a minimal local web UI (localhost-only). Data is stored on disk as JSON.</div>

  <div class="row" style="margin-top:16px;">
    <div class="col">
      <h2>Inbox</h2>
      <div id="inbox"></div>

      <h2>Active</h2>
      <div id="active"></div>

      <h2>Completed</h2>
      <div id="completed"></div>
    </div>

    <div class="col">
      <h2>Artifact</h2>
      <div id="artifactMeta" class="meta">Select a task.</div>
      <pre id="artifact">(none)</pre>
      <div class="buttons">
        <button id="approve" disabled>✅ Approve</button>
        <button id="reject" disabled>❌ Reject</button>
      </div>
    </div>
  </div>

<script>
  let selectedTask = null;

  function el(tag, attrs={}, children=[]) {
    const e = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
    children.forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
    return e;
  }

  async function loadTasks() {
    const res = await fetch('/api/tasks');
    return await res.json();
  }

  function renderTaskList(containerId, tasks) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    if (!tasks.length) {
      container.appendChild(el('div', {class:'meta'}, ['(none)']));
      return;
    }

    for (const t of tasks) {
      const div = el('div', {class:'task'});
      div.appendChild(el('div', {}, [t.title]));
      div.appendChild(el('div', {class:'meta'}, [
        `id: ${t.id} · `,
        el('span', {class:'pill'}, [t.status]),
        ` · updated: ${t.updatedAt}`
      ]));

      div.addEventListener('click', () => selectTask(t));
      container.appendChild(div);
    }
  }

  async function selectTask(t) {
    selectedTask = t;
    document.getElementById('approve').disabled = false;
    document.getElementById('reject').disabled = false;
    document.getElementById('artifactMeta').textContent = `Task: ${t.title} (${t.status})`;

    const res = await fetch(`/api/tasks/${t.id}/artifact`);
    const text = await res.text();
    document.getElementById('artifact').textContent = text;
  }

  async function refresh() {
    const tasks = await loadTasks();
    renderTaskList('inbox', tasks.filter(t => t.status === 'inbox'));
    renderTaskList('active', tasks.filter(t => t.status === 'active'));
    renderTaskList('completed', tasks.filter(t => t.status === 'completed'));
  }

  async function post(path) {
    await fetch(path, {method:'POST'});
    await refresh();
    if (selectedTask) {
      // Reload selection from latest state.
      const tasks = await loadTasks();
      const t = tasks.find(x => x.id === selectedTask.id);
      if (t) await selectTask(t);
    }
  }

  document.getElementById('approve').addEventListener('click', async () => {
    if (!selectedTask) return;
    await post(`/api/tasks/${selectedTask.id}/approve`);
  });
  document.getElementById('reject').addEventListener('click', async () => {
    if (!selectedTask) return;
    await post(`/api/tasks/${selectedTask.id}/reject`);
  });

  refresh();
</script>
</body>
</html>
